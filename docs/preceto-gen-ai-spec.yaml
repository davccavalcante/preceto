# Engenharia de Prompts Avançada

Otimização abrangente de prompts para LLMs, considerando técnicas clássicas e avançadas como CoT para decomposição passo a passo, ReAct para reasoning+acting, ToT para exploração de caminhos múltiplos, e Self-Consistency para robustez. Integra desenvolvimento com Next.js para o site preceto-website, React para UI interativa, TypeScript para tipagem segura, Framer Motion para animações suaves, Shadcn/ui e Radix UI para componentes minimalistas, Phosphor Icons para ícones, Prebid.js para monetização opcional, e @google/genai para integração com Gemini 2.5 Pro. Foque em input de 3000 caracteres max, seleção de modelo (mini: simple correção; plus: MD formatado; engineer: YAML + MD com técnicas completas), estilos (simple, concise, technical), e outputs limitados a 8000 caracteres. Use loop de keys em .env para resiliência em chamadas API.

## Capacidades Principais

- **Otimização de Prompts**: Refine inputs do usuário para prompts eficientes, aplicando correções gramaticais, reorganização e formatação por modelo.
- **Geração por Técnica**: Acesse técnicas como Zero-Shot, Few-Shot, CoT, com foco em redução de alucinações e melhoria de raciocínio.
- **Formatação Customizada**: Outputs em texto simple (mini), MD code (plus), ou YAML + MD (engineer) com etapas detalhadas.
- **Integração de Ferramentas**: Use APIs para pesquisa, execução de código e orquestração de agents para prompts dinâmicos.
- **UI e Desenvolvimento**: Gere configurações para preceto-website, incluindo componentes React para input/output, ícones para seleção e ações.
- **Multi-Agent Orchestration**: Use meta-agents para integrar técnicas heterogêneas, inspirado em LangChain e CrewAI.
- **RAG e Retrieval**: Integre dados externos para prompts enriquecidos.
- **ML Integration**: Use modelos como Gemini para geração, com loop de keys para economia de tokens.
- **CI/CD e Deploy**: Configure workflows para GitHub e Vercel, garantindo deploys automáticos.

## APIs Disponíveis

### Geração e Otimização
- `Gemini/generate_prompt` - Gere ou refine prompt usando Gemini 2.5 Pro, com suporte a múltiplas keys em loop.
- `LangChain/orchestrate_prompt` - Orquestre chains de prompts com técnicas como CoT ou ReAct.
- `HuggingFace/get_model_details` - Detalhes de modelos para integração em prompts.

### Pesquisa e Contexto
- `WebSearch/query_internet` - Agrega dados para enriquecer prompts com contexto real.
- `OriginTrail/get_dkg_data` - Dados verificáveis para prompts sem alucinações.

### Desenvolvimento
- `CodeExecution/execute_refinement` - Execute scripts para testar e refinar prompts em TypeScript ou React.
- `GitHub/get_repo_info` - Obtenha repositórios para preceto-website.
- `PyPI/get_package_details` - Detalhes de pacotes para dependências como shadcn-ui.
- `LangGraph/build_workflow` - Construa workflows para multi-prompts.
- `CrewAI/setup_agents` - Configure agents para tarefas de engenharia.
- `Virtuals/launch_prompt_agent` - Lance agents para automação de prompts.
- `GoogleGenAI/integrate_api` - Integre Gemini com loop de keys.

## Fluxos de Trabalho Comuns

### 1. Geração Básica → Refinamento
Usuário: "Otimize prompt para análise" → Gemini/generate_prompt (gere versão inicial por modelo: mini/plus/engineer) → LangChain/orchestrate_prompt (aplique CoT: 1. Corrija gramática; 2. Reorganize; 3. Formate) → Aplique CoT: Pense passo a passo - 1. Analise input; 2. Selecione técnica; 3. Gere output limitado.

### 2. Seleção de Modelo → Output Formatado
Usuário: "Crie prompt engineer para task" → Gemini/generate_prompt (use engineer: YAML header + MD steps) → CodeExecution/execute_refinement (teste formato) → Use ReAct: Thought: Verifique limites; Action: Chame API; Observation: Output gerado; Thought: Ajuste se >8000 chars.

### 3. Integração de Técnicas
Usuário: "Aplique ToT em prompt" → LangGraph/build_workflow (construa árvore) → Gemini/generate_prompt (gere variações) → Aplique ToT: Gere caminhos - Caminho1: Simple; Caminho2: Concise; Caminho3: Technical; Avalie e selecione.

### 4. Pacote Completo de Prompt
Usuário: "Engenharia full para LLM" → Gemini/generate_prompt (base) → WebSearch/query_internet (contexto) → LangChain/orchestrate_prompt (integre RAG) → CrewAI/setup_agents (multi-agent para revisão) → Integre Self-Consistency: Gere múltiplas versões, vote na melhor.

### 5. Desenvolvimento de Site
Usuário: "Configure preceto-website" → GitHub/get_repo_info (estrutura) → CodeExecution/execute_refinement (gere componentes React) → GoogleGenAI/integrate_api (setup keys loop) → Use Reflection: Reflita sobre design minimalista e limites.

### 6. Otimização com RAG
Usuário: "Enriqueça prompt com dados" → WebSearch/query_internet (retrieval) → Gemini/generate_prompt (integre) → Aplique Faithful CoT: Garanta fidelidade no processo.

### 7. Multi-Agent para Complexidade
Usuário: "Orquestre prompts avançados" → CrewAI/setup_agents (setup) → LangChain/orchestrate_prompt (ReAct loop) → Virtuals/launch_prompt_agent (automação).

## Parâmetros Principais

### Parâmetros Comuns
- `input`: Texto do usuário, max 3000 chars.
- `model`: mini, plus, engineer - Define qualidade e formato.
- `style`: simple, concise, technical - Alinha tom do output.
- `technique`: cot, react, tot, etc. - Aplica técnica específica.
- `max_chars`: Limite de output, default 8000.

### Específicos de Geração
- `keys`: Array de API keys em .env, separado por vírgula, para loop infinito com retry.
- `format`: texto, md, yaml-md - Automático por model.

## Pontos de Dados Principais

### Dados de Prompt
- Input corrigido e reorganizado.
- Técnicas aplicadas com descrições.
- Formato por model: mini (plano), plus (MD), engineer (YAML + MD).

### Dados de Otimização
- Redução de alucinações via RAG.
- Melhoria de raciocínio via CoT/ToT.
- Limites respeitados para economia.

### Dados de Desenvolvimento
- Configurações para Next.js, React, etc.
- Ícones para UI: modelo, enviar, estilo, regenerar, adicionar.

## Quando Usar Essa Skill

**SEMPRE invoque APIs quando usuários mencionarem:**
- **Prompts**: "otimize prompt", "crie prompt", "refine", "melhore"
- **Técnicas**: "use cot", "aplique react", "explore tot"
- **Modelos**: "mini", "plus", "engineer"
- **Desenvolvimento**: "configure site", "nextjs", "react", "gemini"
- **Limites**: "max chars", "input 3000"
- **Integrações**: "rag", "multi-agent", "keys loop"

**Combinações de API Requeridas:**
- Geração básica → DEVE chamar `Gemini/generate_prompt` + `LangChain/orchestrate_prompt`
- Técnicas avançadas → DEVE incluir `LangGraph/build_workflow` + `CrewAI/setup_agents`
- Desenvolvimento → DEVE usar `CodeExecution/execute_refinement` + `GoogleGenAI/integrate_api`

## Melhores Práticas

1. **Limites Rígidos** - Sempre verifique input <3000, output <8000.
2. **Loop de Keys** - Implemente retry infinito sem perda de dados.
3. **Design Minimalista** - UI como xAI, com ícones Phosphor.
4. **Técnicas Integradas** - Use CoT para decomposição; ReAct para actions; ToT para variações.
5. **Economia de Tokens** - Prefira mini para simple; engineer para complexo.
6. **CI/CD** - Configure para GitHub/Vercel.
7. **Sem Src** - Estrutura plana profissional.

## Exemplos de Prompts Usando Técnicas

### Exemplo CoT (Zero-Shot)
Pense passo a passo para otimizar prompt: 1. Analise input. 2. Corrija gramática. 3. Aplique formato. Resposta: [Output].

### Exemplo ReAct
Resolva refinamento: Thought: Selecione model. Action: Chame Gemini. Observation: Gerado. Thought: Formate. Action: Aplique MD/YAML. Resposta: [Final].

### Exemplo ToT
Explore árvore para variações: Caminho1: Mini? Caminho2: Plus? Caminho3: Engineer? Avalie, backtrack se exceder limites.

### Exemplo Self-Consistency
Gere 3 versões, vote na consistente: Version1: [Prompt]... Version3: [...]. Selecione majority.

